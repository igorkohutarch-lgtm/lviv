<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Локатор & Чат з Купонами</title>
    
    <!-- Google Fonts & Leaflet CSS для карти -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #121214;
            --bg-secondary: #1a1a1e;
            --bg-tertiary: #26262b;
            --accent: #ff4757;
            --accent-hover: #ff6b81;
            --text-main: #f5f5f7;
            --text-muted: #a0a0a5;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        #app-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Компоненти профілю (Сайдбар) */
        #profile-sidebar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate3d(-50%, -50%, 0);
            width: 92%;
            max-width: 440px;
            height: 85vh;
            background-color: var(--bg-secondary);
            border-radius: 24px;
            z-index: 100;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
        }

        .drag-handle {
            width: 100%;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            background: var(--bg-secondary);
            flex-shrink: 0;
            z-index: 10;
        }

        .drag-handle::before {
            content: '';
            width: 40px;
            height: 5px;
            background-color: var(--bg-tertiary);
            border-radius: 3px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .profile-title h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-title p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .close-btn {
            background: var(--bg-tertiary);
            border: none;
            color: var(--text-main);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        /* Прев'ю Галереї */
        .gallery-preview-wrapper {
            width: 100%;
            height: 120px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .gallery-preview-wrapper::-webkit-scrollbar { display: none; }

        .img-thumb {
            width: 120px;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            flex-shrink: 0;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .img-thumb:hover { border-color: var(--accent); }

        /* Вікно повнорозмірної галереї */
        #gallery-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 10, 12, 0.95);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }

        #gallery-img {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            will-change: transform;
        }

        /* Секція Чату всередині профілю */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            min-height: 250px;
            overflow: hidden;
        }

        #chat-messages {
            flex: 1;
            list-style: none;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #chat-messages li {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
            position: relative;
        }

        .msg-me {
            background-color: var(--accent);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-other {
            background-color: var(--bg-tertiary);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-user-name {
            display: block;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 2px;
            opacity: 0.7;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            padding: 0 14px;
            font-size: 14px;
            outline: none;
        }

        .chat-input-area button, .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-input-area button:hover, .action-btn:hover { background: var(--accent-hover); }

        /* Модалка QR коду */
        #qr-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .qr-card {
            background: #fff;
            color: #000;
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }
        #qr-code-space img { display: block; margin: 16px auto; }

        @media (max-width: 480px) {
            #profile-sidebar {
                top: auto; bottom: 0; left: 0; transform: translate3d(0, 100%, 0);
                width: 100%; height: 88vh; border-radius: 24px 24px 0 0;
            }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Мапа Leaflet -->
        <div id="map"></div>

        <!-- Сайдбар закладу/профілю -->
        <div id="profile-sidebar">
            <div class="drag-handle"></div>
            <div class="sidebar-content">
                <div class="profile-header">
                    <div class="profile-title">
                        <h2 id="prof-title">Назва локації</h2>
                        <p id="prof-type">Категорія</p>
                    </div>
                    <button class="close-btn" onclick="closeProfile()">&times;</button>
                </div>

                <!-- Горизонтальна галерея -->
                <div class="gallery-preview-wrapper" id="prof-gallery"></div>

                <button class="action-btn" id="prof-btn">Отримати Купон</button>

                <!-- Інтегрований чат -->
                <div class="chat-container">
                    <ol id="chat-messages"></ol>
                    <div class="chat-input-area">
                        <input type="text" id="chat-msg-input" placeholder="Напишіть повідомлення..." autocomplete="off">
                        <button id="chat-send-btn">Надісл.</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка купона (QR) -->
    <div id="qr-modal">
        <div class="qr-card">
            <h3>Твій купон на знижку</h3>
            <div id="qr-code-space"></div>
            <button class="action-btn" id="qr-close-btn" style="width:100%;">Закрити</button>
        </div>
    </div>

    <!-- Вікно повнорозмірної галереї -->
    <div id="gallery-modal">
        <img id="gallery-img" src="" alt="FullView">
    </div>

    <!-- Підключення Leaflet API -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Модулі Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // КОНФІГУРАЦІЯ FIREBASE (Заміни на власні дані!)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Тимчасове ім'я користувача
        const myName = "Гість_" + Math.floor(Math.random() * 1000);

        // Базові фейкові дані місць (для прикладу на карті)
        const places = [
            {
                id: "place_1",
                name: "Кав'ярня 'Латте Арт'",
                type: "Кафе",
                lat: 50.4501, lng: 30.5234,
                photos: [
                    "https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=400",
                    "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400"
                ]
            },
            {
                id: "place_2",
                name: "Ресторан 'Паста & Базилік'",
                type: "Ресторан",
                lat: 50.4545, lng: 30.5280,
                photos: [
                    "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400",
                    "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400"
                ]
            }
        ];

        // Глобальні змінні стану додатка
        let map, currentActiveItem = null, currentChatRef = null;
        let activePhotosArray = [], currentPhotoIndex = 0;

        // Ініціалізація карти
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([50.4501, 30.5234], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            // Рендер маркерів
            places.forEach(place => {
                const marker = L.marker([place.lat, place.lng]).addTo(map);
                marker.on('click', () => openProfile(place));
            });
        }

        // Логіка Сайдбару профілю
        function openProfile(place) {
            currentActiveItem = { type: 'place', ...place };
            document.getElementById('prof-title').innerText = place.name;
            document.getElementById('prof-type').innerText = place.type;
            
            // Очищення та збирання галереї прев'ю
            const gallBox = document.getElementById('prof-gallery');
            gallBox.innerHTML = '';
            activePhotosArray = place.photos || [];

            activePhotosArray.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'img-thumb';
                img.addEventListener('click', () => openGallery(index));
                gallBox.appendChild(img);
            });

            // Налаштування чату
            document.getElementById('chat-messages').innerHTML = '';
            loadChat(place.id);

            // Візуальне відкриття з анімацією
            const sb = document.getElementById('profile-sidebar');
            sb.style.display = 'flex';
            setTimeout(() => {
                if (window.innerWidth <= 480) {
                    sb.style.transform = 'translate3d(0, 0, 0)';
                } else {
                    sb.style.transform = 'translate3d(-50%, -50%, 0)';
                }
                sb.style.opacity = '1';
            }, 10);
        }

        window.closeProfile = function() {
            const sb = document.getElementById('profile-sidebar');
            if (window.innerWidth <= 480) {
                sb.style.transform = 'translate3d(0, 100%, 0)';
            } else {
                sb.style.transform = 'translate3d(-50%, 100%, 0)';
            }
            sb.style.opacity = '0';
            setTimeout(() => { sb.style.display = 'none'; }, 400);
            currentActiveItem = null;
            currentChatRef = null;
        };

        // Логіка Повноформатної галереї
        function openGallery(index) {
            currentPhotoIndex = index;
            const modal = document.getElementById('gallery-modal');
            const img = document.getElementById('gallery-img');
            img.src = activePhotosArray[currentPhotoIndex];
            img.style.transform = 'translate3d(0,0,0)';
            modal.style.display = 'flex';
        }

        function changeGalleryPhoto(dir) {
            currentPhotoIndex += dir;
            if (currentPhotoIndex < 0) currentPhotoIndex = activePhotosArray.length - 1;
            if (currentPhotoIndex >= activePhotosArray.length) currentPhotoIndex = 0;
            
            const img = document.getElementById('gallery-img');
            img.style.transition = 'none';
            img.style.transform = `translate3d(${dir * -40}px, 0, 0)`;
            img.src = activePhotosArray[currentPhotoIndex];
            
            setTimeout(() => {
                img.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                img.style.transform = 'translate3d(0,0,0)';
            }, 30);
        }

        function closeGallery() {
            document.getElementById('gallery-modal').style.display = 'none';
        }

        // Тач-події свайпів для галереї (вліво/вправо — перемикання, вниз — закриття)
        const galleryImgBox = document.getElementById('gallery-img');
        let galStartX = 0, galStartY = 0, galCurrX = 0, galCurrY = 0, activeTouch = false;

        galleryImgBox.addEventListener('touchstart', (e) => { 
            if (e.touches.length > 1) return; 
            galStartX = e.touches[0].clientX; 
            galStartY = e.touches[0].clientY; 
            activeTouch = true; 
            galleryImgBox.style.transition = 'none'; 
        }, { passive: true });

        galleryImgBox.addEventListener('touchmove', (e) => {
            if (!activeTouch) return;
            galCurrX = e.touches[0].clientX - galStartX;
            galCurrY = e.touches[0].clientY - galStartY;
            
            if (galCurrY > 0 && Math.abs(galCurrY) > Math.abs(galCurrX)) {
                galleryImgBox.style.transform = `translate3d(0, ${galCurrY}px, 0)`;
            } else {
                galleryImgBox.style.transform = `translate3d(${galCurrX}px, 0, 0)`;
            }
        }, { passive: true });

        galleryImgBox.addEventListener('touchend', () => {
            if (!activeTouch) return;
            activeTouch = false;
            galleryImgBox.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            
            if (galCurrY > 150 && Math.abs(galCurrY) > Math.abs(galCurrX)) {
                closeGallery();
            } else if (galCurrX > 80) {
                changeGalleryPhoto(-1);
            } else if (galCurrX < -80) {
                changeGalleryPhoto(1);
            } else {
                galleryImgBox.style.transform = 'translate3d(0,0,0)';
            }
            galStartX = 0; galStartY = 0; galCurrX = 0; galCurrY = 0;
        });

        document.getElementById('gallery-modal').addEventListener('click', (e) => {
            if (e.target.id === 'gallery-modal') closeGallery();
        });

        // Drag-to-dismiss для сайдбару
        const sidebar = document.getElementById('profile-sidebar');
        const dragHandle = document.querySelector('.drag-handle');
        let sbStartY = 0, sbCurrY = 0, isDraggingSb = false;

        const startDrag = (clientY) => {
            sbStartY = clientY;
            isDraggingSb = true;
            sidebar.style.transition = 'none';
        };

        const moveDrag = (clientY) => {
            if (!isDraggingSb) return;
            sbCurrY = clientY - sbStartY;
            if (sbCurrY > 0) {
                if (window.innerWidth <= 480) {
                    sidebar.style.transform = `translate3d(0, ${sbCurrY}px, 0)`;
                } else {
                    sidebar.style.transform = `translate3d(-50%, calc(-50% + ${sbCurrY}px), 0)`;
                }
            }
        };

        const endDrag = () => {
            if (!isDraggingSb) return;
            isDraggingSb = false;
            if (sbCurrY > 150) {
                closeProfile();
            } else {
                sidebar.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease';
                if (window.innerWidth <= 480) {
                    sidebar.style.transform = 'translate3d(0, 0, 0)';
                } else {
                    sidebar.style.transform = 'translate3d(-50%, -50%, 0)';
                }
            }
            sbStartY = 0; sbCurrY = 0;
        };

        dragHandle.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientY), { passive: true });
        window.addEventListener('touchmove', (e) => moveDrag(e.touches[0].clientY), { passive: false });
        window.addEventListener('touchend', endDrag);

        dragHandle.addEventListener('mousedown', (e) => startDrag(e.clientY));
        window.addEventListener('mousemove', (e) => moveDrag(e.clientY));
        window.addEventListener('mouseup', endDrag);

        // Логіка Купонів (QR)
        document.getElementById('prof-btn').addEventListener('click', () => {
            if (!currentActiveItem || currentActiveItem.type !== 'place') return;
            const qrSpace = document.getElementById('qr-code-space');
            qrSpace.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(currentActiveItem.name + '_coupon_2026')}" alt="QR Code">`;
            document.getElementById('qr-modal').style.display = 'flex';
        });

        document.getElementById('qr-close-btn').addEventListener('click', () => {
            document.getElementById('qr-modal').style.display = 'none';
        });

        // Логіка Firebase чату
        function loadChat(chatId) {
            currentChatRef = ref(db, `chats/${chatId}`);
            const messagesOl = document.getElementById('chat-messages');
            
            onChildAdded(currentChatRef, (snapshot) => {
                const data = snapshot.val();
                const li = document.createElement('li');
                const isMe = data.sender === myName;
                
                li.className = isMe ? 'msg-me' : 'msg-other';
                li.innerHTML = `<span class="msg-user-name">${isMe ? 'Ви' : data.sender}</span>${escapeHTML(data.text)}`;
                
                messagesOl.appendChild(li);
                messagesOl.scrollTop = messagesOl.scrollHeight;
            });
        }

        function sendMessage() {
            const input = document.getElementById('chat-msg-input');
            const text = input.value.trim();
            if (!text || !currentChatRef) return;

            push(currentChatRef, {
                sender: myName,
                text: text,
                timestamp: Date.now()
            });
            input.value = '';
        }

        document.getElementById('chat-send-btn').addEventListener('click', sendMessage);
        document.getElementById('chat-msg-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function escapeHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // Старт програми
        window.onload = () => {
            initMap();
        };
    </script>
</body>
</html>

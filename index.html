<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моє Портфоліо & Профіль</title>
    <!-- Підключення іконок Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Підключення бібліотеки для QR-коду -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ФІКСОВАНА КНОПКА-ІКОНКА ПРОФІЛЮ --- */
        .profile-trigger {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 2px solid var(--accent);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 999; /* Поверх картки портфоліо */
        }

        .profile-trigger:active {
            transform: scale(0.92);
        }

        .profile-trigger img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-trigger i {
            color: var(--accent);
            font-size: 1.3rem;
        }

        /* --- ВИТАГУВАЛЬНА ВКЛАДКА / МОДАЛКА ПРОФІЛЮ --- */
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            z-index: 2000; /* Поверх усього */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .profile-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .profile-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 0 0 24px 24px;
            padding: 40px 20px 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            transform: translateY(-100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-bottom: 3px solid var(--accent);
        }

        .profile-modal.active .profile-card {
            transform: translateY(0);
        }

        .close-profile {
            position: absolute;
            top: 15px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin: 0 auto 15px auto;
            overflow: hidden;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar i {
            font-size: 3.5rem;
            color: var(--text-muted);
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .profile-bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            padding: 0 15px;
            line-height: 1.5;
        }

        .messenger-channels {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .messenger-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .messenger-btn:active {
            transform: scale(0.95);
        }

        .btn-tg { background-color: #0088cc; }
        .btn-viber { background-color: #7360f2; }


        /* --- ОСНОВНИЙ КОНТЕНТ (БЕЗ ЗМІН) --- */
        .main-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            padding: 25px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            text-align: center;
            margin-top: 40px; /* Відступ від фіксованої іконки */
        }

        .gallery-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 16px;
            overflow: hidden;
            background-color: #0f172a;
            margin-bottom: 20px;
            touch-action: pan-y;
        }

        .gallery-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .gallery-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        .gallery-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(30, 41, 59, 0.7);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
            z-index: 10;
        }

        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        .indicators {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
            cursor: pointer;
        }

        .dot.active {
            background: var(--accent);
            width: 20px;
            border-radius: 4px;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .qr-wrapper {
            background: white;
            padding: 12px;
            border-radius: 16px;
            display: inline-block;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .share-btn {
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
            justify-content: center;
        }

        .share-btn:hover { background-color: var(--accent-hover); }
        .share-btn:active { transform: scale(0.98); }

        /* --- ЛАЙТБОКС ГАЛЕРЕЇ --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.95);
            z-index: 2100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            touch-action: none;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            max-width: 95%;
            max-height: 85%;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
        }

        .lightbox.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: transparent;
            border: none;
        }
    </style>
</head>
<body>

    <!-- ФІКСОВАНА ІКОНКА ПРОФІЛЮ ВГОРУ (ПРАВОРУЧ) -->
    <button class="profile-trigger" id="profileTrigger" title="Мій профіль">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=200&auto=format&fit=crop" alt="Аватар" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <i class="fa-solid fa-user" style="display: none;"></i>
    </button>

    <!-- ВКЛАДКА ПРОФІЛЮ -->
    <div class="profile-modal" id="profileModal">
        <div class="profile-card" id="profileCard">
            <button class="close-profile" id="closeProfile">&times;</button>
            
            <div class="profile-avatar">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=200&auto=format&fit=crop" alt="Фото профілю" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <i class="fa-solid fa-user" style="display: none;"></i>
            </div>
            
            <h2 class="profile-name">Олександра</h2>
            <p class="profile-bio">Привіт! Рада бачити вас у моєму портфоліо. Ви можете швидко написати мені або зателефонувати в один клік нижче 👇</p>
            
            <div class="messenger-channels">
                <a href="https://t.me/username" target="_blank" class="messenger-btn btn-tg">
                    <i class="fa-brands fa-telegram"></i> Telegram
                </a>
                <a href="viber://chat?number=380000000000" target="_blank" class="messenger-btn btn-viber">
                    <i class="fa-brands fa-viber"></i> Viber
                </a>
            </div>
        </div>
    </div>

    <!-- ОСНОВНА КАРТКА -->
    <main class="main-card">
        <div class="gallery-container" id="galleryContainer">
            <div class="gallery-track" id="galleryTrack">
                <div class="gallery-slide">
                    <img src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?q=80&w=800" alt="Пейзаж 1">
                </div>
                <div class="gallery-slide">
                    <img src="https://images.unsplash.com/photo-1682687220063-4742bd7fd538?q=80&w=800" alt="Пейзаж 2">
                </div>
                <div class="gallery-slide">
                    <img src="https://images.unsplash.com/photo-1682687220111-174154913059?q=80&w=800" alt="Пейзаж 3">
                </div>
            </div>
            
            <button class="nav-btn prev-btn" id="prevBtn" aria-label="Назад">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button class="nav-btn next-btn" id="nextBtn" aria-label="Вперед">
                <i class="fa-solid fa-chevron-right"></i>
            </button>

            <div class="indicators" id="indicators"></div>
        </div>

        <div class="qr-section">
            <div class="qr-wrapper">
                <div id="qrcode"></div>
            </div>
            <button class="share-btn" id="shareBtn">
                <i class="fa-solid fa-share-nodes"></i> Поділитися посиланням
            </button>
        </div>
    </main>

    <!-- ЛАЙТБОКС -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content" id="lightboxContent">
            <button class="lightbox-close" id="lightboxClose">&times;</button>
            <img class="lightbox-img" id="lightboxImg" src="" alt="Збільшене фото">
        </div>
    </div>

    <script>
        // --- СКРИПТ ВКЛАДКИ ПРОФІЛЮ ---
        const profileTrigger = document.getElementById('profileTrigger');
        const profileModal = document.getElementById('profileModal');
        const profileCard = document.getElementById('profileCard');
        const closeProfile = document.getElementById('closeProfile');

        function openProfileModal() {
            profileModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeProfileModal() {
            profileModal.classList.remove('active');
            document.body.style.overflow = '';
        }

        profileTrigger.addEventListener('click', openProfileModal);
        closeProfile.addEventListener('click', closeProfileModal);
        
        profileModal.addEventListener('click', (e) => {
            if (e.target === profileModal) closeProfileModal();
        });

        // --- ГАЛЕРЕЯ ТА СВАЙПИ ---
        const track = document.getElementById('galleryTrack');
        const slides = Array.from(track.children);
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const indicatorsContainer = document.getElementById('indicators');
        
        let currentIndex = 0;
        let startX = 0;
        let currentX = 0;
        let isDragging = false;

        slides.forEach((_, idx) => {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if(idx === 0) dot.classList.add('active');
            dot.addEventListener('click', () => updateGallery(idx));
            indicatorsContainer.appendChild(dot);
        });
        const dots = Array.from(indicatorsContainer.children);

        function updateGallery(index) {
            currentIndex = index;
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === currentIndex);
            });
        }

        nextBtn.addEventListener('click', () => {
            if (currentIndex < slides.length - 1) updateGallery(currentIndex + 1);
            else updateGallery(0);
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) updateGallery(currentIndex - 1);
            else updateGallery(slides.length - 1);
        });

        const container = document.getElementById('galleryContainer');
        container.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            isDragging = true;
            track.style.transition = 'none';
        }, { passive: true });

        container.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX;
            const diff = currentX - startX;
            const offset = -currentIndex * container.offsetWidth + diff;
            track.style.transform = `translateX(${offset}px)`;
        }, { passive: true });

        container.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;
            track.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
            const diff = currentX - startX;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && currentIndex > 0) updateGallery(currentIndex - 1);
                else if (diff < 0 && currentIndex < slides.length - 1) updateGallery(currentIndex + 1);
                else updateGallery(currentIndex);
            } else {
                updateGallery(currentIndex);
            }
        });

        // --- ЛАЙТБОКС СВАЙПИ ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxClose = document.getElementById('lightboxClose');
        const lightboxContent = document.getElementById('lightboxContent');

        let lbStartY = 0;
        let lbCurrentY = 0;
        let lbIsDragging = false;

        slides.forEach(slide => {
            slide.querySelector('img').addEventListener('click', (e) => {
                if (Math.abs(currentX - startX) < 5) {
                    lightboxImg.src = e.target.src;
                    lightbox.classList.add('active');
                }
            });
        });

        function closeLightbox() {
            lightbox.classList.remove('active');
            lightboxContent.style.transform = 'translateY(0) scale(1)';
        }

        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if(e.target === lightbox) closeLightbox();
        });

        lightbox.addEventListener('touchstart', (e) => {
            lbStartY = e.touches[0].clientY;
            lbIsDragging = true;
            lightboxContent.style.transition = 'none';
        }, { passive: true });

        lightbox.addEventListener('touchmove', (e) => {
            if (!lbIsDragging) return;
            lbCurrentY = e.touches[0].clientY;
            const diffY = lbCurrentY - lbStartY;
            if (diffY > 0) {
                lightboxContent.style.transform = `translateY(${diffY}px) scale(${1 - diffY/2000})`;
            }
        }, { passive: true });

        lightbox.addEventListener('touchend', () => {
            if (!lbIsDragging) return;
            lbIsDragging = false;
            lightboxContent.style.transition = 'transform 0.3s ease';
            const diffY = lbCurrentY - lbStartY;
            if (diffY > 150) closeLightbox();
            else lightboxContent.style.transform = 'translateY(0) scale(1)';
        });

        // --- QR-КОД ТА ПОШИРЕННЯ ---
        const currentUrl = window.location.href;
        new QRCode(document.getElementById("qrcode"), {
            text: currentUrl,
            width: 140,
            height: 140,
            colorDark: "#0f172a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        document.getElementById('shareBtn').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Моє Портфоліо',
                        url: currentUrl
                    });
                } catch (err) {
                    console.log('Помилка поширення:', err);
                }
            } else {
                navigator.clipboard.writeText(currentUrl).then(() => {
                    alert('Посилання скопійовано в буфер обміну!');
                }).catch(() => {
                    alert('Не вдалося скопіювати посилання.');
                });
            }
        });
    </script>
</body>
</html>
